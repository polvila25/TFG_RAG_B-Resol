version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./storage/qdrant:/qdrant/storage
    restart: always

  bresol_app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - QDRANT_MODE=server
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - qdrant
    restart: always
